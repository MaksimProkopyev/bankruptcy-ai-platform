# -------------------------------------------------------
# НССБ «Максимум» — единый Nginx-конфиг
# -------------------------------------------------------

# ── HTTP → HTTPS ────────────────────────────────────────

server {
    if ($host = staff.nssb-maximum.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = leadgen.nssb-maximum.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = lk.nssb-maximum.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = crm.nssb-maximum.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = api.nssb-maximum.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = www.nssb-maximum.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = nssb-maximum.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name nssb-maximum.ru www.nssb-maximum.ru crm.nssb-maximum.ru lk.nssb-maximum.ru api.nssb-maximum.ru leadgen.nssb-maximum.ru staff.nssb-maximum.ru;
    return 301 https://$host$request_uri;
}

# ── nssb-maximum.ru ─────────────────────────────────────

server {
    listen 443 ssl;
    server_name nssb-maximum.ru www.nssb-maximum.ru;
    ssl_certificate /etc/letsencrypt/live/nssb-maximum.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/nssb-maximum.ru/privkey.pem; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /sw.js { alias /var/www/pwa/sw.js; add_header Content-Type application/javascript; add_header Cache-Control "no-cache"; }
    location = /manifest.json { alias /var/www/pwa/main/manifest.json; add_header Content-Type application/manifest+json; add_header Cache-Control "no-cache"; }
    location = /offline.html { alias /var/www/pwa/offline.html; }
    location /icons/ { alias /var/www/pwa/icons/; }

    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

