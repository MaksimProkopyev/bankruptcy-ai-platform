services:
  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bankruptcy_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "2006b32a9ea3a6037f36aace561a4f65e6f3df938af0f2eb25f769324175ff73D"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (cache + task queue)
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s

  # MinIO (S3-compatible file storage)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data

  # Ollama (local LLM) - optional
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:2006b32a9ea3a6037f36aace561a4f65e6f3df938af0f2eb25f769324175ff73@postgres:5432/bankruptcy_ai
      REDIS_URL: redis://:8024286e2b373c4df9ea95d33c9d737bbde6d3bc@redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # AI Core service
  ai-core:
    build:
      context: ./ai-core
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:2006b32a9ea3a6037f36aace561a4f65e6f3df938af0f2eb25f769324175ff73@postgres:5432/bankruptcy_ai
      REDIS_URL: redis://:8024286e2b373c4df9ea95d33c9d737bbde6d3bc@redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ai-core:/app

  # Site Frontend (Next.js, port 3000)
  site-frontend:
    build:
      context: ./site-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./site-frontend:/app
      - /app/node_modules
    command: npm run dev

  # CRM Frontend (Next.js, port 3002)
  crm-frontend:
    build: ./crm-frontend
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  # Client LK Frontend (Next.js, port 3003)
  lk-frontend:
    build: ./lk-frontend
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  # Leadgen Frontend (Next.js, port 3004)
  leadgen-frontend:
    build: ./leadgen-frontend
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      - backend
      - leadgen
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_LEADGEN_API_URL=http://leadgen:8002
      - JWT_SECRET=${JWT_SECRET}
    restart: unless-stopped

  # Staff Portal (Next.js, port 3001)
  staff-frontend:
    build:
      context: ./staff-frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  # AI Task Worker (processes OCR, document gen)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:2006b32a9ea3a6037f36aace561a4f65e6f3df938af0f2eb25f769324175ff73@postgres:5432/bankruptcy_ai
      REDIS_URL: redis://:8024286e2b373c4df9ea95d33c9d737bbde6d3bc@redis:6379/0
      AI_CORE_URL: http://ai-core:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-core:
        condition: service_started
    volumes:
      - ./backend:/app
    command: python -m app.services.worker

  # Gov leads collector worker (FSSP/KAD/EFRSB/FNS/Rosreestr)
  lead-collector-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:2006b32a9ea3a6037f36aace561a4f65e6f3df938af0f2eb25f769324175ff73@postgres:5432/bankruptcy_ai
      REDIS_URL: redis://:8024286e2b373c4df9ea95d33c9d737bbde6d3bc@redis:6379/0
      LEAD_COLLECTOR_MOCK_MODE: ${LEAD_COLLECTOR_MOCK_MODE:-true}
      FSSP_API_URL: ${FSSP_API_URL:-}
      FSSP_API_KEY: ${FSSP_API_KEY:-}
      KAD_API_URL: ${KAD_API_URL:-}
      KAD_API_KEY: ${KAD_API_KEY:-}
      EFRSB_API_URL: ${EFRSB_API_URL:-}
      EFRSB_API_KEY: ${EFRSB_API_KEY:-}
      FNS_API_URL: ${FNS_API_URL:-}
      ROSREESTR_API_URL: ${ROSREESTR_API_URL:-}
      ROSREESTR_API_KEY: ${ROSREESTR_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m workers.lead_collectors

  # Gov leads outreach worker
  lead-outreach-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:2006b32a9ea3a6037f36aace561a4f65e6f3df938af0f2eb25f769324175ff73@postgres:5432/bankruptcy_ai
      REDIS_URL: redis://:8024286e2b373c4df9ea95d33c9d737bbde6d3bc@redis:6379/0
      LEAD_OUTREACH_DRY_RUN: ${LEAD_OUTREACH_DRY_RUN:-true}
      LEAD_OUTREACH_SMS_API_URL: ${LEAD_OUTREACH_SMS_API_URL:-}
      LEAD_OUTREACH_SMS_API_KEY: ${LEAD_OUTREACH_SMS_API_KEY:-}
      LEAD_OUTREACH_EMAIL_API_URL: ${LEAD_OUTREACH_EMAIL_API_URL:-}
      LEAD_OUTREACH_EMAIL_API_KEY: ${LEAD_OUTREACH_EMAIL_API_KEY:-}
      LEAD_OUTREACH_FROM_EMAIL: ${LEAD_OUTREACH_FROM_EMAIL:-no-reply@bankrotstvo.ai}
      LEAD_OUTREACH_TELEGRAM_BOT_TOKEN: ${LEAD_OUTREACH_TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m workers.outreach

  # Telegram Bot (optional, needs TELEGRAM_BOT_TOKEN)
  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      AI_CORE_URL: http://ai-core:8001
      BACKEND_URL: http://backend:8000/api/v1
    depends_on:
      - backend
      - ai-core
    volumes:
      - ./backend:/app
    command: python -m integrations.telegram_bot
    profiles:
      - telegram

volumes:
  pgdata:
  miniodata:
  ollama_data:
