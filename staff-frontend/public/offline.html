<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НССБ Максимум — нет соединения</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1B3A5C;
      color: #F8F7F4;
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    h1 { color: #C9A84C; font-size: 2rem; margin-bottom: 16px; }
    p { font-size: 1rem; opacity: 0.8; max-width: 320px; line-height: 1.6; }
    button {
      margin-top: 32px;
      padding: 12px 32px;
      background: #C9A84C;
      color: #1B3A5C;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Нет соединения</h1>
  <p>Проверьте подключение к интернету и попробуйте снова.</p>
  <button onclick="window.location.reload()">Обновить</button>
</body>
</html>
