services:
  # PostgreSQL + pgvector
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bankruptcy_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/app/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (cache + task queue)
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s

  # MinIO (S3-compatible file storage)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - miniodata:/data

  # Ollama (local LLM) - optional
  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: http://minio:9000
      SECRET_KEY: ${JWT_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      YOS_ACCESS_KEY: ${YOS_ACCESS_KEY}
      YOS_SECRET_KEY: ${YOS_SECRET_KEY}
      YOS_ENDPOINT: ${YOS_ENDPOINT:-https://storage.yandexcloud.net}
      YOS_REGION: ${YOS_REGION:-ru-central1}
      YOS_BUCKET_LIBRARY: ${YOS_BUCKET_LIBRARY:-bankruptcy-ai-knowledge}
      YOS_BUCKET_CLIENTS: ${YOS_BUCKET_CLIENTS:-bfl-crm-clients-nocodb-prod}
      CORS_ORIGINS: '["https://crm.nssb-maximum.ru","https://api.nssb-maximum.ru","https://staff.nssb-maximum.ru","https://lk.nssb-maximum.ru","https://leadgen.nssb-maximum.ru","http://localhost:3000","http://localhost:8000"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Leadgen Service (FastAPI, port 8002)
  leadgen:
    build:
      context: .
      dockerfile: leadgen/Dockerfile
    container_name: bankruptcy-leadgen
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/2
      - CRM_INTERNAL_URL=http://backend:8000
      - AI_STUDIO_URL=http://ai-core:8001
      - AI_STUDIO_WEBHOOK_SECRET=${AI_STUDIO_WEBHOOK_SECRET:-}
      - GREEN_API_TOKEN=${GREEN_API_TOKEN:-}
      - VK_API_TOKEN=${VK_API_TOKEN:-}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN:-}
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    restart: unless-stopped

  # AI Core service
  ai-core:
    build:
      context: ./ai-core
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ai-core:/app

  # Site Frontend (Next.js, port 3000)
  site-frontend:
    build:
      context: ./site-frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    command: npm run start

  # CRM Frontend (Next.js, port 3002)
  crm-frontend:
    build:
      context: .
      dockerfile: crm-frontend/Dockerfile
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    restart: unless-stopped

  # Client LK Frontend (Next.js, port 3003)
  lk-frontend:
    build:
      context: .
      dockerfile: lk-frontend/Dockerfile
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    restart: unless-stopped

  # Leadgen Frontend (Next.js, port 3004)
  leadgen-frontend:
    build:
      context: .
      dockerfile: leadgen-frontend/Dockerfile
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      - backend

    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_LEADGEN_API_URL=http://leadgen:8002
    restart: unless-stopped

  # Staff Portal (Next.js, port 3001)
  staff-frontend:
    build:
      context: ./staff-frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000/api/v1
      NEXT_PUBLIC_CRM_URL: https://crm.nssb-maximum.ru
    depends_on:
      - backend
    restart: unless-stopped

  # AI Task Worker (processes OCR, document gen)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      AI_CORE_URL: http://ai-core:8001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-core:
        condition: service_started
    volumes:
      - ./backend:/app
    command: python -m app.services.worker

  # Gov leads collector worker (FSSP/KAD/EFRSB/FNS/Rosreestr)
  lead-collector-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LEAD_COLLECTOR_MOCK_MODE: ${LEAD_COLLECTOR_MOCK_MODE:-true}
      FSSP_API_URL: ${FSSP_API_URL:-}
      FSSP_API_KEY: ${FSSP_API_KEY:-}
      KAD_API_URL: ${KAD_API_URL:-}
      KAD_API_KEY: ${KAD_API_KEY:-}
      EFRSB_API_URL: ${EFRSB_API_URL:-}
      EFRSB_API_KEY: ${EFRSB_API_KEY:-}
      FNS_API_URL: ${FNS_API_URL:-}
      ROSREESTR_API_URL: ${ROSREESTR_API_URL:-}
      ROSREESTR_API_KEY: ${ROSREESTR_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m workers.lead_collectors

  # Gov leads outreach worker
  lead-outreach-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      LEAD_OUTREACH_DRY_RUN: ${LEAD_OUTREACH_DRY_RUN:-true}
      LEAD_OUTREACH_SMS_API_URL: ${LEAD_OUTREACH_SMS_API_URL:-}
      LEAD_OUTREACH_SMS_API_KEY: ${LEAD_OUTREACH_SMS_API_KEY:-}
      LEAD_OUTREACH_EMAIL_API_URL: ${LEAD_OUTREACH_EMAIL_API_URL:-}
      LEAD_OUTREACH_EMAIL_API_KEY: ${LEAD_OUTREACH_EMAIL_API_KEY:-}
      LEAD_OUTREACH_FROM_EMAIL: ${LEAD_OUTREACH_FROM_EMAIL:-no-reply@bankrotstvo.ai}
      LEAD_OUTREACH_TELEGRAM_BOT_TOKEN: ${LEAD_OUTREACH_TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python -m workers.outreach

  # Telegram Bot (optional, needs TELEGRAM_BOT_TOKEN)
  telegram-bot:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      AI_CORE_URL: http://ai-core:8001
      BACKEND_URL: http://backend:8000/api/v1
    depends_on:
      - backend
      - ai-core
    volumes:
      - ./backend:/app
    command: python -m integrations.telegram_bot
    profiles:
      - telegram

volumes:
  pgdata:
  miniodata:
  ollama_data:
